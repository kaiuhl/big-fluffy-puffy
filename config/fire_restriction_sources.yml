    extra_source_paths:
      - key: public-use-restrictions
        name: Public Use Restrictions
        source_type: fs_fire_info_page
        path: /fire/info/public-use-restrictions
        parser_key: usfs_html
    sources:
      - slug: deschutes-central-oregon-restrictions
        name: Central Oregon Fire Restriction Layer
        source_type: arcgis_feature_layer
