defaults:
  poll_interval_minutes: 720
  source_paths:
    - key: fire
      name: Fire
      source_type: fs_fire_page
      path: /fire
      parser_key: usfs_html
    - key: fire-info
      name: Fire Information
      source_type: fs_fire_info_page
      path: /fire/info
      parser_key: usfs_html
    - key: alerts
      name: Alerts
      source_type: fs_alerts_page
      path: /alerts
      parser_key: usfs_html
    - key: releases
      name: News Releases
      source_type: fs_release_page
      path: /newsroom/releases
      parser_key: usfs_html

land_units:
  - slug: colville
    name: Colville National Forest
    unit_type: national_forest
    region_code: R06
    forest_slug: colville
    market_bucket: core_pnw
    official_url: https://www.fs.usda.gov/r06/colville
    active: true

  - slug: deschutes
    name: Deschutes National Forest
    unit_type: national_forest
