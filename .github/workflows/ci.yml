name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bfp
          POSTGRES_PASSWORD: bfp
          POSTGRES_DB: bfp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      RACK_ENV: test
      BRIDGETOWN_ENV: test
      TEST_DATABASE_URL: postgres://bfp:bfp@localhost:5432/bfp_test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rake spec
      - run: bundle exec standardrb
      - run: docker compose config
