services:
  caddy:
    image: caddy:2
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  web:
    build: .
    command: bundle exec puma -C config/puma.rb
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      RACK_ENV: ${RACK_ENV:-development}
      BRIDGETOWN_ENV: ${BRIDGETOWN_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://bfp:bfp@postgres:5432/bfp_development}
      LLM_PROVIDER: ${LLM_PROVIDER:-bedrock}
      LLM_PARSE_ENABLED: ${LLM_PARSE_ENABLED:-true}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      BEDROCK_ESCALATION_MODEL_ID: ${BEDROCK_ESCALATION_MODEL_ID:-global.anthropic.claude-sonnet-4-5-20250929-v1:0}
    depends_on:
      - postgres
    ports:
      - "9292:9292"

  worker:
    build: .
    command: ruby jobs/worker.rb
    profiles:
      - jobs
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      RACK_ENV: ${RACK_ENV:-development}
      BRIDGETOWN_ENV: ${BRIDGETOWN_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://bfp:bfp@postgres:5432/bfp_development}
      LLM_PROVIDER: ${LLM_PROVIDER:-bedrock}
      LLM_PARSE_ENABLED: ${LLM_PARSE_ENABLED:-true}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      BEDROCK_ESCALATION_MODEL_ID: ${BEDROCK_ESCALATION_MODEL_ID:-global.anthropic.claude-sonnet-4-5-20250929-v1:0}
    depends_on:
      - postgres

  clock:
    build: .
    command: ruby jobs/clock.rb
    profiles:
      - jobs
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      RACK_ENV: ${RACK_ENV:-development}
      BRIDGETOWN_ENV: ${BRIDGETOWN_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://bfp:bfp@postgres:5432/bfp_development}
      LLM_PROVIDER: ${LLM_PROVIDER:-bedrock}
      LLM_PARSE_ENABLED: ${LLM_PARSE_ENABLED:-true}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      BEDROCK_PRIMARY_MODEL_ID: ${BEDROCK_PRIMARY_MODEL_ID:-global.anthropic.claude-haiku-4-5-20251001-v1:0}
      BEDROCK_ESCALATION_MODEL_ID: ${BEDROCK_ESCALATION_MODEL_ID:-global.anthropic.claude-sonnet-4-5-20250929-v1:0}
      CLOCK_INTERVAL_SECONDS: ${CLOCK_INTERVAL_SECONDS:-300}
      FIRE_POLL_BATCH_SIZE: ${FIRE_POLL_BATCH_SIZE:-25}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bfp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bfp}
      POSTGRES_DB: ${POSTGRES_DB:-bfp_development}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
